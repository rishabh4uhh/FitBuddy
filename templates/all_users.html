<!DOCTYPE html>
<html>
<head>

<title>Admin Dashboard</title>

<style>

body{
font-family:Arial;
background:#f4f4f4;
padding:20px;
}

h1{
text-align:center;
}

table{
width:100%;
border-collapse:collapse;
background:white;
}

th,td{
padding:12px;
border:1px solid #ddd;
text-align:left;
}

th{
background:#2a5298;
color:white;
}

tr:nth-child(even){
background:#f2f2f2;
}

pre{
white-space:pre-wrap;
}

</style>

</head>

<body>

<h1>FitBuddy Admin Dashboard</h1>

<table>

<tr>
<th>ID</th>
<th>Name</th>
<th>Age</th>
<th>Weight</th>
<th>Goal</th>
<th>Intensity</th>
<th>Original Plan</th>
<th>Updated Plan</th>
</tr>

{% for user in users %}

<tr>

<td>{{ user.id }}</td>
<td>{{ user.name }}</td>
<td>{{ user.age }}</td>
<td>{{ user.weight }}</td>
<td>{{ user.goal }}</td>
<td>{{ user.intensity }}</td>
<td><pre>{{ user.original_plan }}</pre></td>
<td><pre>{{ user.updated_plan }}</pre></td>

</tr>

{% endfor %}

</table>

</body>
</html>
