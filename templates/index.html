<!DOCTYPE html>
<html>
<head>
<title>FitBuddy AI</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

body{
font-family:'Poppins',sans-serif;
margin:0;
height:100vh;
background:linear-gradient(135deg,#1e3c72,#2a5298);
display:flex;
align-items:center;
justify-content:center;
color:white;
}

.container{
background:white;
color:black;
padding:40px;
border-radius:10px;
width:350px;
box-shadow:0px 8px 25px rgba(0,0,0,0.3);
}

h1{
text-align:center;
margin-bottom:20px;
}

input,select{
width:100%;
padding:10px;
margin:8px 0;
border-radius:5px;
border:1px solid #ccc;
}

button{
width:100%;
padding:12px;
background:#2a5298;
color:white;
border:none;
border-radius:5px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#1e3c72;
}

</style>

</head>

<body>

<div class="container">

<h1>FitBuddy</h1>

<form action="/generate-workout" method="post">

<label>Name</label>
<input type="text" name="name" required>

<label>Age</label>
<input type="number" name="age" required>

<label>Weight (kg)</label>
<input type="number" name="weight" required>

<label>Fitness Goal</label>
<input type="text" name="goal" placeholder="Weight Loss / Muscle Gain" required>

<label>Workout Intensity</label>
<select name="intensity">
<option>Low</option>
<option>Medium</option>
<option>High</option>
</select>

<br><br>

<button type="submit">Generate Plan</button>

</form>

</div>

</body>
</html>
